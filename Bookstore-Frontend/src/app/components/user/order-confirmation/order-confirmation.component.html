<app-user-navbar></app-user-navbar>

<div class="container py-5 text-center">
  <div class="card shadow-sm mx-auto" style="max-width: 600px; border-radius: 12px; border: none;">
    <div class="card-body p-5">
      <div class="mb-4">
        <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
      </div>
      <h2 class="fw-bold mb-3">Order Placed Successfully!</h2>
      <p class="text-muted mb-4">Thank you for shopping with Smart Bookstore. Your order has been placed successfully.</p>
      
      <div class="alert alert-info py-3 mb-4" role="alert">
        <h5 class="alert-heading mb-1">Order ID</h5>
        <strong>{{ orderId }}</strong>
      </div>
      
      <p class="mb-4 text-muted small">
        We've sent a confirmation email with order details and a link to track your shipment.
      </p>
      
      <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
        <button class="btn btn-primary px-4 py-2" (click)="goToOrders()">
          <i class="fas fa-box me-2"></i>Track Order
        </button>
        <button class="btn btn-outline-secondary px-4 py-2" (click)="goToDashboard()">
          <i class="fas fa-home me-2"></i>Return Home
        </button>
      </div>
    </div>
  </div>
</div>
