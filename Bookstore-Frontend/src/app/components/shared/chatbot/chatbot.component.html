<!-- Floating Chat Button -->
<div class="chat-fab" (click)="toggleChat()" [class.hidden]="isOpen">
  <i class="fas fa-comments"></i>
  <span class="unread-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  <div class="fab-pulse"></div>
</div>

<!-- Chat Window -->
<div class="chat-window" [class.open]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="bot-avatar">
        <i class="fas fa-robot"></i>
      </div>
      <div>
        <h6>Smart Book Assistant</h6>
        <span class="status-online"><i class="fas fa-circle"></i> Online</span>
      </div>
    </div>
    <button class="chat-close-btn" (click)="toggleChat()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <!-- Chat Body -->
  <div class="chat-body" #chatBody>
    <div *ngFor="let msg of messages" 
         class="message-wrapper" 
         [class.user-message]="msg.isUser" 
         [class.bot-message]="!msg.isUser">
      <div class="message-avatar" *ngIf="!msg.isUser">
        <i class="fas fa-robot"></i>
      </div>
      <div class="message-bubble">
        <p class="message-text">{{ msg.text }}</p>
        <span class="message-time">{{ formatTime(msg.timestamp) }}</span>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="message-wrapper bot-message" *ngIf="isTyping">
      <div class="message-avatar">
        <i class="fas fa-robot"></i>
      </div>
      <div class="message-bubble typing-bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions" *ngIf="messages.length <= 1 && !isTyping">
      <p class="quick-actions-label">Try asking:</p>
      <div class="quick-actions-grid">
        <button *ngFor="let action of quickActions" 
                class="quick-action-btn" 
                (click)="sendQuickAction(action.message)">
          {{ action.label }}
        </button>
      </div>
    </div>
  </div>

  <!-- Chat Footer -->
  <div class="chat-footer">
    <div class="input-area">
      <input type="text" 
             id="chatInput"
             class="chat-input" 
             [(ngModel)]="userInput" 
             (keypress)="onKeyPress($event)"
             placeholder="Ask me about books..."
             [disabled]="isTyping"
             autocomplete="off">
      <button class="send-btn" 
              (click)="sendMessage()" 
              [disabled]="!userInput.trim() || isTyping">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
    <p class="powered-by">Powered by AI ✨</p>
  </div>
</div>
